name: jQuery CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Verify Repository
      run: |
        echo "Checking files..."
        ls -la