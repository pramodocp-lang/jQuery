<!DOCTYPE html>
<html>
<head>
    <title>jQuery Example</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <h2 id="msg">Hello World</h2>

    <button id="btn">Click Me</button>

    <script>
        $("#btn").click(function() {
            $("#msg").toggle();
        });
    </script>

</body>
</html>
